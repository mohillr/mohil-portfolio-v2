<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Inbox</p>
          <h1>Website Messages</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh messages" aria-label="Refresh messages">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section id="setupNotice" class="notice hidden">
        <strong>Connect your database</strong>
        <span>Open <code>config.js</code> and add your Firebase or Supabase details.</span>
      </section>

      <section class="toolbar" aria-label="Message tools">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Name, email, or message" autocomplete="off" />
        </label>
        <div class="count-pill"><span id="messageCount">0</span> messages</div>
      </section>

      <section id="statusPanel" class="status-panel">Loading messages...</section>
      <section id="messageList" class="message-list" aria-live="polite"></section>
    </main>

    <template id="messageTemplate">
      <article class="message-card">
        <div class="message-card__header">
          <div>
            <h2 data-field="name"></h2>
            <a data-field="email"></a>
          </div>
          <time data-field="createdAt"></time>
        </div>
        <p data-field="message"></p>
      </article>
    </template>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
